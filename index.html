<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaspora In Motion | The Global Town Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --lim-green: #1C5E37; --naija-gold: #FFD700; }
        body { background: #0f172a; font-family: 'Inter', sans-serif; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .text-lim { color: #2ecc71; }
        .bg-lim { background-color: var(--lim-green); }
        .card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .card:hover { transform: translateY(-5px); border-color: var(--lim-green); }
        .radio-glow { box-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
    </style>
</head>
<body class="pb-24">

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-lim rounded-xl flex items-center justify-center text-white font-bold shadow-lg border border-white/20">D</div>
            <div>
                <h1 class="text-xl font-black tracking-tighter">DIASPORA <span class="text-lim">IN MOTION</span></h1>
                <p class="text-[9px] uppercase tracking-[0.3em] text-slate-400 font-bold">Media • Community • Commerce</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <a href="https://www.patreon.com/cw/LivesInMotion" target="_blank" class="bg-white text-black px-5 py-2 rounded-full font-bold text-xs hover:bg-lim hover:text-white transition">JOIN SQUARE</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-3 space-y-6">
            <div class="glass p-5 rounded-3xl">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Channels</h3>
                <nav class="space-y-2">
                    <button onclick="loadCategory('nigeria')" class="w-full text-left p-3 rounded-xl font-bold text-sm hover:bg-white/5 transition flex items-center gap-3">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span> 🇳🇬 Naija Daily
                    </button>
                    <button onclick="loadCategory('tech')" class="w-full text-left p-3 rounded-xl font-bold text-sm hover:bg-white/5 transition flex items-center gap-3">
                        <span class="w-2 h-2 rounded-full bg-blue-500"></span> 💻 TechCabal
                    </button>
                    <button onclick="loadCategory('lifestyle')" class="w-full text-left p-3 rounded-xl font-bold text-sm hover:bg-white/5 transition flex items-center gap-3">
                        <span class="w-2 h-2 rounded-full bg-pink-500"></span> 🍲 Lifestyle
                    </button>
                </nav>
            </div>

            <div class="bg-gradient-to-br from-[#1C5E37] to-[#0a2e1a] p-6 rounded-3xl shadow-2xl relative overflow-hidden group">
                <div class="relative z-10">
                    <h4 class="font-black text-lg mb-2 italic">Global Directory</h4>
                    <p class="text-xs text-white/70 mb-6 leading-relaxed">Promote your business to the worldwide Nigerian Diaspora.</p>
                    <a href="https://livesinmotion.lemonsqueezy.com/checkout/buy/7f46f2d4-b982-40cb-baca-1fda62c5d0cb" target="_blank" class="block text-center w-full bg-white text-black py-3 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl group-hover:bg-green-400 transition">Get Listed</a>
                </div>
                <i class="fa-solid fa-earth-africa absolute -bottom-4 -right-4 text-white/5 text-8xl"></i>
            </div>
        </aside>

        <section class="lg:col-span-9">
            <div id="feed-header" class="mb-8">
                <h2 class="text-3xl font-black italic">The Town <span class="text-lim">Square Feed</span></h2>
                <div class="h-1 w-20 bg-lim mt-2"></div>
            </div>

            <div id="feed" class="grid md:grid-cols-2 gap-6">
                </div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-6 py-4 z-[100] radio-glow">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div class="w-12 h-12 bg-lim rounded-full flex items-center justify-center animate-spin-slow">
                        <i class="fa-solid fa-compact-disc text-2xl text-white"></i>
                    </div>
                    <div class="absolute -top-1 -right-1 w-4 h-4 bg-red-600 rounded-full border-2 border-[#0f172a] animate-pulse"></div>
                </div>
                <div>
                    <h4 class="text-xs font-black uppercase tracking-tighter text-white">Lives In Motion Radio</h4>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Now Playing: Global Diaspora Hits</p>
                </div>
            </div>
            
            <div class="flex-1 max-w-md w-full">
                <audio id="radio-player" class="w-full h-8" controls src="https://azuracast-nuremberg.myautodj.com/listen/station_8321_1775290855/radio.mp3">
                    Your browser does not support the audio element.
                </audio>
            </div>

            <div class="hidden md:flex gap-4">
                <a href="#" class="text-slate-400 hover:text-white transition"><i class="fa-brands fa-instagram text-xl"></i></a>
                <a href="#" class="text-slate-400 hover:text-white transition"><i class="fa-brands fa-whatsapp text-xl"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // UPDATED NIGERIAN SOURCES
        const FEEDS = {
            nigeria: 'https://punchng.com/topics/news/feed/',
            tech: 'https://techcabal.com/feed/',
            lifestyle: 'https://vanguardngr.com/category/entertainment/feed/'
        };

        async function loadCategory(cat) {
            const feedContainer = document.getElementById('feed');
            feedContainer.innerHTML = '<div class="col-span-full py-20 text-center text-slate-500 animate-pulse font-bold italic uppercase tracking-widest">Gathering Stories...</div>';
            
            try {
                // Using a faster RSS-to-JSON proxy
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(FEEDS[cat])}`);
                const data = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                feedContainer.innerHTML = Array.from(items).slice(0, 10).map(item => {
                    const title = item.querySelector("title").textContent;
                    const link = item.querySelector("link").textContent;
                    const desc = item.querySelector("description")?.textContent.replace(/<[^>]*>/g, '').substring(0, 100);
                    
                    // Simple logic to find an image in the RSS, or use a placeholder
                    let imgUrl = "https://images.unsplash.com/photo-1523213139764-dc30a09f216e?auto=format&fit=crop&w=800&q=80"; // Default African landscape
                    if(cat === 'tech') imgUrl = "https://images.unsplash.com/photo-1526628953301-3e589a6a8b74?auto=format&fit=crop&w=800&q=80";
                    if(cat === 'lifestyle') imgUrl = "https://images.unsplash.com/photo-1496024840928-4c417adb2d1d?auto=format&fit=crop&w=800&q=80";

                    return `
                        <div class="glass rounded-3xl card group">
                            <div class="h-48 w-full overflow-hidden">
                                <img src="${imgUrl}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500 opacity-60">
                            </div>
                            <div class="p-6">
                                <div class="flex gap-2 mb-3">
                                    <span class="text-[9px] font-black bg-lim text-white px-2 py-1 rounded">LATEST</span>
                                </div>
                                <h3 class="text-lg font-bold text-white mb-3 leading-tight group-hover:text-lim transition">${title}</h3>
                                <p class="text-xs text-slate-400 mb-6 leading-relaxed">${desc}...</p>
                                <div class="flex justify-between items-center">
                                    <a href="${link}" target="_blank" class="text-[10px] font-black uppercase tracking-widest border-b-2 border-lim pb-1 hover:text-lim transition">Read Article</a>
                                    <button class="text-slate-500 hover:text-white transition"><i class="fa-regular fa-share-from-square"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                feedContainer.innerHTML = '<div class="col-span-full py-20 text-center text-slate-500">Service temporarily offline. Check back shortly.</div>';
            }
        }

        window.onload = () => loadCategory('nigeria');
    </script>
</body>
</html>
