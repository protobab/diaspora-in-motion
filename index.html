<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaspora In Motion | The Global Town Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --lim-green: #1C5E37; }
        body { background: #020617; font-family: 'Inter', sans-serif; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .text-lim { color: #4ade80; }
        .bg-lim { background-color: var(--lim-green); }
        .feed-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .feed-card:hover { transform: scale(1.02); border-color: #4ade80; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5); }
        .shimmer { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-32">

    <nav class="glass sticky top-0 z-50 px-8 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-lim rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-2xl rotate-3">D</div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter italic">DIASPORA <span class="text-lim">IN MOTION</span></h1>
                <p class="text-[10px] uppercase tracking-[0.4em] text-slate-500 font-bold">The Global Town Square</p>
            </div>
        </div>
        <div class="flex gap-4">
            <a href="https://www.patreon.com/cw/LivesInMotion" target="_blank" class="bg-white text-black px-6 py-2.5 rounded-full font-black text-xs hover:bg-lim hover:text-white transition-all shadow-lg">JOIN COMMUNITY</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid lg:grid-cols-12 gap-10">
        
        <aside class="lg:col-span-3 space-y-8">
            <div class="glass p-6 rounded-[2rem] border-white/10">
                <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Channels</h3>
                <nav class="space-y-3">
                    <button onclick="loadCategory('nigeria')" class="w-full text-left p-4 rounded-2xl font-bold text-sm hover:bg-white/5 transition-all flex items-center gap-4 group">
                        <i class="fa-solid fa-bolt-lightning text-lim group-hover:animate-bounce"></i> 🇳🇬 Naija News
                    </button>
                    <button onclick="loadCategory('tech')" class="w-full text-left p-4 rounded-2xl font-bold text-sm hover:bg-white/5 transition-all flex items-center gap-4 group">
                        <i class="fa-solid fa-microchip text-blue-400 group-hover:animate-pulse"></i> 💻 TechCabal
                    </button>
                    <button onclick="loadCategory('entertainment')" class="w-full text-left p-4 rounded-2xl font-bold text-sm hover:bg-white/5 transition-all flex items-center gap-4 group">
                        <i class="fa-solid fa-clapperboard text-pink-500"></i> 🎬 Entertainment
                    </button>
                </nav>
            </div>

            <div class="bg-gradient-to-tr from-[#1C5E37] to-[#2ecc71] p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden group">
                <div class="relative z-10">
                    <h4 class="font-black text-xl mb-3 leading-tight">Global Business Directory</h4>
                    <p class="text-xs text-white/80 mb-8 leading-relaxed">Join 500+ diaspora-owned brands featured globally.</p>
                    <a href="https://livesinmotion.lemonsqueezy.com/checkout/buy/7f46f2d4-b982-40cb-baca-1fda62c5d0cb" target="_blank" class="block text-center w-full bg-black text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl hover:bg-white hover:text-black transition-all">List My Business</a>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-9">
            <header class="flex justify-between items-end mb-10">
                <div>
                    <h2 id="current-channel" class="text-4xl font-black uppercase tracking-tighter">Naija Daily</h2>
                    <div class="h-1.5 w-24 bg-lim mt-2 rounded-full"></div>
                </div>
            </header>

            <div id="feed" class="grid md:grid-cols-2 gap-8">
                <div class="h-80 glass rounded-[2rem] shimmer"></div>
                <div class="h-80 glass rounded-[2rem] shimmer"></div>
            </div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-8 py-5 z-[100]">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-lim rounded-full flex items-center justify-center relative overflow-hidden group">
                    <i class="fa-solid fa-radio text-2xl animate-pulse"></i>
                </div>
                <div>
                    <h4 class="text-xs font-black uppercase tracking-widest text-white">Lives In Motion Radio</h4>
                    <span class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Live Broadcast</p>
                    </span>
                </div>
            </div>
            
            <div class="flex-1 max-w-xl w-full px-4">
                <audio id="radio-player" class="w-full" controls src="https://azuracast-nuremberg.myautodj.com/listen/station_8321_1775290855/radio.mp3"></audio>
            </div>
        </div>
    </footer>

    <script>
        const FEEDS = {
            nigeria: 'https://rss.punchng.com/v1/category/latest_news',
            tech: 'https://techcabal.com/feed/',
            entertainment: 'https://www.vanguardngr.com/category/entertainment/feed/'
        };

        const PROXIES = [
            (url) => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
            (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
        ];

        async function fetchWithRetry(url) {
            for (let proxy of PROXIES) {
                try {
                    const response = await fetch(proxy(url));
                    if (response.ok) return await response.text();
                } catch (e) { console.warn("Proxy failed, trying next..."); }
            }
            throw new Error("All proxies failed");
        }

        async function loadCategory(cat) {
            const feed = document.getElementById('feed');
            document.getElementById('current-channel').innerText = cat === 'nigeria' ? 'Naija News' : cat;
            
            try {
                const xmlText = await fetchWithRetry(FEEDS[cat]);
                const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                feed.innerHTML = Array.from(items).slice(0, 12).map((item, index) => {
                    const title = item.querySelector("title").textContent;
                    const link = item.querySelector("link").textContent;
                    const desc = item.querySelector("description")?.textContent.replace(/<[^>]*>/g, '').substring(0, 110);
                    const imgUrl = `https://picsum.photos/seed/${cat}${index}/800/500`; // Dynamic high-quality photos

                    return `
                        <article class="glass rounded-[2rem] overflow-hidden feed-card group flex flex-col">
                            <div class="h-56 relative overflow-hidden">
                                <img src="${imgUrl}" class="w-full h-full object-cover transition duration-700 group-hover:scale-110 group-hover:rotate-1 opacity-80">
                                <div class="absolute inset-0 bg-gradient-to-t from-[#020617] to-transparent"></div>
                            </div>
                            <div class="p-8 flex-1 flex flex-col">
                                <h3 class="text-xl font-black leading-tight mb-4 group-hover:text-lim transition-colors">${title}</h3>
                                <p class="text-slate-400 text-xs leading-relaxed mb-6">${desc}...</p>
                                <div class="mt-auto flex justify-between items-center">
                                    <a href="${link}" target="_blank" class="text-[10px] font-black uppercase tracking-[0.2em] text-lim hover:text-white transition">Read Article →</a>
                                    <span class="text-[9px] text-slate-600 font-bold uppercase italic">Town Square Daily</span>
                                </div>
                            </div>
                        </article>
                    `;
                }).join('');
            } catch (e) {
                feed.innerHTML = `<div class="col-span-full py-20 text-center"><p class="text-slate-500 font-bold">The Town Square is crowded. Try refreshing in a second.</p></div>`;
            }
        }

        window.onload = () => loadCategory('nigeria');
    </script>
</body>
</html>
