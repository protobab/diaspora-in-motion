<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaspora In Motion | The Global Town Square</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script 
      async 
      crossorigin="anonymous" 
      data-clerk-publishable-key="pk_test_cHJvZm91bmQtc29sZS04MS5jbGVyay5hY2NvdW50cy5kZXYk" 
      src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" 
      type="text/javascript">
    </script>

    <style>
        :root { --lim-green: #1C5E37; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .bg-lim { background-color: var(--lim-green); }
        .text-lim { color: var(--lim-green); }
        .feed-card { transition: all 0.2s ease; border: 1px solid #e2e8f0; }
        .feed-card:hover { transform: translateY(-3px); border-color: var(--lim-green); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <nav class="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-lim rounded-xl flex items-center justify-center text-white font-bold shadow-lg">D</div>
            <div>
                <h1 class="text-xl font-black text-slate-800">DIASPORA <span class="text-lim">IN MOTION</span></h1>
                <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Lives In Motion Media</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div id="user-button"></div>
            <button id="sign-in-btn" class="bg-lim text-white px-6 py-2 rounded-full font-bold text-sm shadow-md hover:opacity-90 transition">Join Square</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto grid lg:grid-cols-12 gap-8 p-6">
        <aside class="lg:col-span-3 space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-slate-800 mb-4 uppercase text-xs tracking-wider">Town Square Hub</h3>
                <nav class="space-y-2">
                    <button onclick="loadCategory('general')" class="w-full text-left px-4 py-2 rounded-lg font-semibold text-slate-600 text-sm hover:bg-slate-50 transition">🌍 Africa News</button>
                    <button onclick="loadCategory('lifestyle')" class="w-full text-left px-4 py-2 rounded-lg font-semibold text-slate-600 text-sm hover:bg-slate-50 transition">🍲 Lifestyle</button>
                    <button onclick="loadCategory('tech')" class="w-full text-left px-4 py-2 rounded-lg font-semibold text-slate-600 text-sm hover:bg-slate-50 transition">💻 Tech</button>
                </nav>
            </div>
            
            <div class="bg-black p-6 rounded-2xl text-white shadow-xl">
                <h4 class="font-bold mb-2">Premium Directory</h4>
                <p class="text-[11px] opacity-70 mb-4">Get listed and grow your diaspora brand.</p>
                <button onclick="window.open('#')" class="w-full bg-white text-black py-2 rounded-lg font-bold text-xs shadow-lg">List My Business</button>
            </div>
        </aside>

        <section class="lg:col-span-6">
            <div id="feed" class="space-y-6">
                <div class="text-center py-20 text-slate-400 animate-pulse">Initializing Town Square...</div>
            </div>
        </section>

        <aside class="lg:col-span-3">
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                <h3 class="font-bold text-slate-800 mb-4 italic">Trending</h3>
                <div class="space-y-4 text-xs font-bold text-slate-500">
                    <p class="border-b pb-2">#NaijaInnovation</p>
                    <p class="border-b pb-2">#DiasporaInvestment</p>
                    <p>#LagosLifestyle</p>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const CLERK_PUBLISHABLE_KEY = "pk_test_cHJvZm91bmQtc29sZS04MS5jbGVyay5hY2NvdW50cy5kZXYk";
        const FEEDS = {
            general: 'https://feeds.bbci.co.uk/news/world/africa/rss.xml',
            lifestyle: 'https://allafrica.com/tools/headlines/rdf/lifestyle/main.html',
            tech: 'https://technext.ng/feed/'
        };

        // --- AUTH LOGIC ---
        async function initClerk() {
            const btn = document.getElementById('sign-in-btn');
            
            // Wait for the script to actually exist in the browser
            const checkClerk = setInterval(async () => {
                if (window.Clerk) {
                    clearInterval(checkClerk);
                    const clerk = new Clerk(CLERK_PUBLISHABLE_KEY);
                    await clerk.load();

                    if (clerk.user) {
                        clerk.mountUserButton(document.getElementById("user-button"));
                        btn.classList.add("hidden");
                    } else {
                        btn.onclick = () => clerk.openSignUp();
                    }
                    console.log("Clerk Ready");
                }
            }, 500);
        }

        // --- NEWS LOGIC ---
        async function loadCategory(cat) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '<div class="text-center py-10 text-slate-400">Loading stories...</div>';
            
            try {
                // Using a fallback proxy if AllOrigins is slow
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(FEEDS[cat])}`);
                const data = await response.json();
                const xml = data.contents;
                
                const items = new DOMParser().parseFromString(xml, "text/xml").querySelectorAll("item");
                
                if (items.length === 0) throw new Error("No items");

                feed.innerHTML = Array.from(items).slice(0, 10).map(item => `
                    <div class="bg-white p-6 rounded-2xl shadow-sm feed-card">
                        <h2 class="text-lg font-bold text-slate-800 mb-2 leading-tight">${item.querySelector("title").textContent}</h2>
                        <p class="text-sm text-slate-500 mb-4 line-clamp-2">${item.querySelector("description")?.textContent.split('<')[0] || ""}</p>
                        <div class="flex justify-between items-center border-t pt-4">
                            <button class="text-xs font-bold text-slate-400"><i class="fa-regular fa-comment"></i> Discuss</button>
                            <a href="${item.querySelector("link").textContent}" target="_blank" class="text-xs font-bold text-lim">Read Full →</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
                feed.innerHTML = `<div class="p-10 text-center text-slate-400 bg-white rounded-2xl border border-dashed border-slate-200">
                    <p class="font-bold">Content currently unavailable.</p>
                    <p class="text-xs">Please check your internet or try again in a moment.</p>
                    <button onclick="location.reload()" class="mt-4 text-xs text-lim underline">Refresh Page</button>
                </div>`;
            }
        }

        window.onload = () => {
            initClerk();
            loadCategory('general');
        };
    </script>
</body>
</html>
