<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaspora In Motion | Town Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script async crossorigin="anonymous" src="https://clerk.livesinmotion.co.uk/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --lim-green: #1C5E37; }
        .bg-lim { background-color: var(--lim-green); }
        .text-lim { color: var(--lim-green); }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-lim rounded flex items-center justify-center text-white font-bold">D</div>
                <span class="font-black text-slate-800 text-lg">DIASPORA <span class="text-lim">IN MOTION</span></span>
            </div>
            
            <div id="auth-links" class="flex items-center gap-4">
                <div id="user-button"></div>
                <button id="sign-in-btn" class="bg-lim text-white px-5 py-2 rounded-full text-sm font-bold shadow-md">Join Square</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 grid lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-3">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <h3 class="font-bold text-slate-800 mb-4 tracking-tight">Premium Directory</h3>
                <div class="space-y-4">
                    <div class="p-3 bg-slate-50 rounded-lg border-l-4 border-lim">
                        <p class="text-xs font-bold text-slate-700">Lagos Grill London</p>
                        <p class="text-[10px] text-slate-400">Authentic Cuisine • SE1</p>
                    </div>
                    <div class="p-3 bg-slate-50 rounded-lg border-l-4 border-lim">
                        <p class="text-xs font-bold text-slate-700">Naija Tech Hub</p>
                        <p class="text-[10px] text-slate-400">Workspace • Ikeja</p>
                    </div>
                </div>
                <button onclick="window.open('https://yourstore.lemonsqueezy.com/checkout/...')" class="mt-6 w-full py-2 border-2 border-lim text-lim rounded-xl font-bold text-xs hover:bg-lim hover:text-white transition">List Your Business</button>
            </div>
        </aside>

        <section class="lg:col-span-6 space-y-6">
            <div id="news-feed" class="space-y-6">
                <div class="text-center py-20 text-slate-400">Loading the Town Square...</div>
            </div>
        </section>

        <aside class="lg:col-span-3">
            <div class="bg-black text-white p-6 rounded-2xl shadow-xl">
                <h3 class="font-bold mb-4 italic">The Diaspora Pulse</h3>
                <div class="space-y-3">
                    <p class="text-xs border-b border-gray-800 pb-2">🔥 <span class="font-bold">Remittance News:</span> New rates for NGN...</p>
                    <p class="text-xs border-b border-gray-800 pb-2">🎭 <span class="font-bold">Entertainment:</span> Burna Boy announces world tour...</p>
                </div>
            </div>
        </aside>

    </main>

    <script>
        // 1. Clerk Authentication Setup
        const clerkPubKey = "PASTE_YOUR_CLERK_PUBLISHABLE_KEY_HERE";

        async function initAuth() {
            const clerk = new Clerk(clerkPubKey);
            await clerk.load();

            const userButtonDiv = document.getElementById("user-button");
            const signInBtn = document.getElementById("sign-in-btn");

            if (clerk.user) {
                clerk.mountUserButton(userButtonDiv);
                signInBtn.classList.add("hidden");
            } else {
                signInBtn.addEventListener("click", () => {
                    clerk.openSignUp();
                });
            }
        }

        // 2. Automated News Engine (Aggregated Lifestyle/Ent/News)
        async function fetchPulse() {
            const feedContainer = document.getElementById('news-feed');
            const proxy = "https://api.allorigins.win/raw?url=";
            // Diverse sources for Lifestyle, Entertainment, and Global News
            const sources = [
                'https://feeds.bbci.co.uk/news/world/africa/rss.xml',
                'https://allafrica.com/tools/headlines/rdf/lifestyle/main.html'
            ];

            try {
                const res = await fetch(proxy + encodeURIComponent(sources[0]));
                const xml = await res.text();
                const items = new DOMParser().parseFromString(xml, "text/xml").querySelectorAll("item");
                
                feedContainer.innerHTML = Array.from(items).slice(0, 8).map(item => `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-[10px] font-black text-lim uppercase mb-2">Town Square Update</p>
                        <h2 class="text-lg font-bold text-slate-800 mb-2 leading-tight">${item.querySelector("title").textContent}</h2>
                        <p class="text-sm text-slate-500 mb-4 line-clamp-2">${item.querySelector("description")?.textContent.split('<')[0] || ""}</p>
                        <div class="flex justify-between items-center">
                            <div class="flex gap-4">
                                <button class="text-xs text-slate-400 font-bold hover:text-lim"><i class="fa-regular fa-comment"></i> Discuss</button>
                                <button class="text-xs text-slate-400 font-bold hover:text-red-400"><i class="fa-regular fa-heart"></i></button>
                            </div>
                            <a href="${item.querySelector("link").textContent}" target="_blank" class="text-xs font-bold text-lim">Read Full Story →</a>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                feedContainer.innerHTML = `<div class="p-10 text-center text-slate-400">Unable to load feed. Refresh to try again.</div>`;
            }
        }

        window.onload = () => {
            initAuth();
            fetchPulse();
        };
    </script>
</body>
</html>
