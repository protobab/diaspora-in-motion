<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaspora In Motion | Town Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script 
      async 
      crossorigin="anonymous" 
      data-clerk-publishable-key="pk_test_cHJvZm91bmQtc29sZS04MS5jbGVyay5hY2NvdW50cy5kZXYk" 
      src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" 
      type="text/javascript">
    </script>

    <style>
        :root { --lim-green: #1C5E37; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .bg-lim { background-color: var(--lim-green); }
        .text-lim { color: var(--lim-green); }
        #main-content { display: none; } 
    </style>
</head>
<body>

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-lim rounded-xl flex items-center justify-center text-white font-bold shadow-lg">D</div>
            <h1 class="text-xl font-black text-slate-800 uppercase italic">Diaspora <span class="text-lim">In Motion</span></h1>
        </div>
        <div id="user-button"></div>
    </nav>

    <div id="auth-container" class="max-w-md mx-auto mt-24 px-4">
        <div class="bg-white p-10 rounded-3xl shadow-2xl border border-gray-100 text-center">
            <div class="w-16 h-16 bg-green-50 text-lim rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">Private Community</h2>
            <p class="text-sm text-slate-500 mb-8 leading-relaxed">The Town Square is a secure space for the global diaspora. Please sign in to join the conversation.</p>
            
            <button id="entry-btn" class="w-full bg-lim text-white py-4 rounded-2xl font-bold shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all flex items-center justify-center gap-3">
                <span>Enter Town Square</span>
                <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>
        </div>
    </div>

    <main id="main-content" class="max-w-7xl mx-auto grid lg:grid-cols-12 gap-8 p-6">
        <aside class="lg:col-span-3">
            <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
                <nav class="space-y-1">
                    <button onclick="loadCategory('general')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl font-bold text-sm text-slate-700">🌍 News Feed</button>
                    <button onclick="loadCategory('lifestyle')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl font-bold text-sm text-slate-700">🎬 Lifestyle</button>
                </nav>
            </div>
        </aside>

        <section class="lg:col-span-6 space-y-4" id="feed"></section>

        <aside class="lg:col-span-3">
            <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl">
                <h4 class="font-bold text-xs uppercase tracking-widest mb-4 text-slate-400">Premium Directory</h4>
                <p class="text-xs mb-6 text-slate-300">Feature your brand in the global diaspora marketplace.</p>
                <button class="w-full bg-white text-black py-3 rounded-xl font-bold text-xs">Join Marketplace</button>
            </div>
        </aside>
    </main>

    <script>
    const PUBLISHABLE_KEY = "pk_test_cHJvZm91bmQtc29sZS04MS5jbGVyay5hY2NvdW50cy5kZXYk";
    
    async function startApp() {
        if (!window.Clerk) {
            setTimeout(startApp, 200);
            return;
        }

        const clerk = new Clerk(PUBLISHABLE_KEY);
        await clerk.load();

        if (clerk.user) {
            // USER IS LOGGED IN: Show the content
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-content').style.display = 'grid';
            clerk.mountUserButton(document.getElementById("user-button"));
            loadCategory('general');
        } else {
            // USER IS LOGGED OUT: Setup the button
            const btn = document.getElementById('entry-btn');
            btn.onclick = () => {
                console.log("Redirecting to secure login...");
                // This method is better because it doesn't get blocked by popup blockers
                clerk.redirectToSignUp({
                    afterSignUpUrl: window.location.href,
                    afterSignInUrl: window.location.href
                });
            };
        }
    }

    // (Keep your existing loadCategory function here...)
    
    startApp();
</script>
</body>
</html>
