<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Diaspora In Motion | Town Square</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>

        :root { --lim-green: #1C5E37; }

        body { background: #f8fafc; font-family: 'Inter', sans-serif; }

        .bg-lim { background-color: var(--lim-green); }

        .text-lim { color: var(--lim-green); }

    </style>

</head>

<body>


    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">

        <div class="flex items-center gap-3">

            <div class="w-10 h-10 bg-lim rounded-xl flex items-center justify-center text-white font-bold shadow-lg">D</div>

            <h1 class="text-xl font-black text-slate-800 uppercase italic">Diaspora <span class="text-lim">In Motion</span></h1>

        </div>

        <a href="https://www.patreon.com/cw/LivesInMotion" target="_blank" class="bg-lim text-white px-6 py-2 rounded-full font-bold text-sm hover:bg-black transition">Join Square</a>

    </nav>


    <main class="max-w-7xl mx-auto grid lg:grid-cols-12 gap-8 p-6">

        

        <aside class="lg:col-span-3 space-y-4">

            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">

                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">The Feed</h3>

                <button onclick="loadCategory('general')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl font-bold text-sm text-slate-700 transition mb-1">🌍 Africa News</button>

                <button onclick="loadCategory('lifestyle')" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl font-bold text-sm text-slate-700 transition">🎬 Lifestyle</button>

            </div>


            <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl">

                <h4 class="font-bold text-sm uppercase tracking-widest mb-2 text-slate-400">Premium Directory</h4>

                <p class="text-[11px] mb-6 text-slate-300">Feature your brand in the global marketplace.</p>

                <a href="https://livesinmotion.lemonsqueezy.com/checkout/buy/7f46f2d4-b982-40cb-baca-1fda62c5d0cb" target="_blank" class="block text-center w-full bg-white text-black py-3 rounded-xl font-bold text-xs">Join Directory</a>

            </div>

        </aside>


        <section class="lg:col-span-6 space-y-4" id="feed">

            <div class="text-center py-20 text-slate-400">Syncing Town Square...</div>

        </section>


        <aside class="lg:col-span-3">

            <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">

                <h3 class="font-bold text-slate-800 mb-4 italic">Conversation</h3>

                <p class="text-xs text-slate-500 mb-4">Want to join the discussion? Our private community lives on Patreon.</p>

                <a href="https://www.patreon.com/cw/LivesInMotion" target="_blank" class="text-xs font-bold text-lim underline">Visit Patreon Square →</a>

            </div>

        </aside>

    </main>


    <script>

        const FEEDS = {

            general: 'https://feeds.bbci.co.uk/news/world/africa/rss.xml',

            lifestyle: 'https://allafrica.com/tools/headlines/rdf/lifestyle/main.html'

        };


        async function loadCategory(cat) {

            const feed = document.getElementById('feed');

            feed.innerHTML = '<div class="text-center py-20 text-slate-400 animate-pulse">Fetching latest stories...</div>';

            

            try {

                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(FEEDS[cat])}`);

                const data = await res.json();

                const items = new DOMParser().parseFromString(data.contents, "text/xml").querySelectorAll("item");

                

                feed.innerHTML = Array.from(items).slice(0, 10).map(item => `

                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:border-green-200 transition">

                        <h3 class="font-bold text-slate-800 mb-2 leading-snug">${item.querySelector("title").textContent}</h3>

                        <p class="text-xs text-slate-500 mb-4 leading-relaxed">${item.querySelector("description")?.textContent.replace(/<[^>]*>/g, '').substring(0, 120)}...</p>

                        <a href="${item.querySelector("link").textContent}" target="_blank" class="text-[10px] font-bold text-lim uppercase tracking-widest">Read Story →</a>

                    </div>

                `).join('');

            } catch (e) {

                feed.innerHTML = '<div class="p-10 text-center text-slate-400">Feed temporarily offline.</div>';

            }

        }


        // Initialize with General News

        window.onload = () => loadCategory('general');

    </script>

</body>

</html>
