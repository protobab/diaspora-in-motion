        try {
            const clerk = window.Clerk;

                // SUCCESS: Ready to Login
                document.getElementById('clerk-login-box').innerHTML = ""; 
                clerk.mountSignIn(document.getElementById("clerk-login-box"));

        } catch (err) {
            alert("Security Error: " + err.message);

        }
    }
