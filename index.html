<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaspora In Motion | Town Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --lim-green: #1C5E37; }
        body { background: #020617; font-family: 'Inter', sans-serif; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .text-lim { color: #4ade80; }
        .bg-lim { background-color: var(--lim-green); }
        
        /* Scroller Styles */
        #slider-container { display: flex; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .slide { flex: 0 0 100%; padding: 0 10px; }
        @media (min-width: 768px) { .slide { flex: 0 0 50%; } }
        @media (min-width: 1024px) { .slide { flex: 0 0 33.333%; } }

        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <nav class="glass sticky top-0 z-50 px-8 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-lim rounded-xl flex items-center justify-center text-white font-black text-lg shadow-xl">D</div>
            <h1 class="text-xl font-black tracking-tighter italic uppercase">DIASPORA <span class="text-lim">IN MOTION</span></h1>
        </div>
        <div class="flex gap-4">
            <a href="https://www.patreon.com/cw/LivesInMotion" target="_blank" class="bg-white text-black px-5 py-2 rounded-full font-black text-[10px] hover:bg-lim hover:text-white transition-all">JOIN PATREON</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-12">
        
        <section class="relative">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-black uppercase tracking-tighter">Town Square <span class="text-lim text-sm ml-2 italic tracking-normal">Live Updates</span></h2>
                </div>
                <div class="flex gap-2">
                    <button onclick="prevSlide()" class="w-8 h-8 rounded-full glass hover:bg-lim transition flex items-center justify-center"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <button onclick="nextSlide()" class="w-8 h-8 rounded-full glass hover:bg-lim transition flex items-center justify-center"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
            </div>

            <div class="overflow-hidden rounded-[2rem]">
                <div id="slider-container" class="py-4">
                    <div class="slide p-10 text-center glass rounded-[2rem] animate-pulse">Gathering Stories...</div>
                </div>
            </div>
        </section>

        <div class="grid lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 bg-gradient-to-tr from-[#1C5E37] to-[#2ecc71] p-8 rounded-[2rem] shadow-2xl">
                <h4 class="font-black text-xl mb-2">Premium Directory</h4>
                <p class="text-xs text-white/80 mb-6">List your business in the global diaspora marketplace.</p>
                <a href="https://livesinmotion.lemonsqueezy.com/checkout/buy/7f46f2d4-b982-40cb-baca-1fda62c5d0cb" target="_blank" class="block text-center w-full bg-black text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-white hover:text-black transition-all">Add Business</a>
            </aside>

            <div class="lg:col-span-8 glass p-8 rounded-[2rem] flex flex-wrap gap-4 items-center">
                <span class="text-[10px] font-black uppercase text-slate-500 tracking-widest mr-4">Switch Channels:</span>
                <button onclick="loadCategory('nigeria')" class="px-4 py-2 rounded-full bg-white/5 hover:bg-lim text-xs font-bold transition">🇳🇬 Naija News</button>
                <button onclick="loadCategory('tech')" class="px-4 py-2 rounded-full bg-white/5 hover:bg-lim text-xs font-bold transition">💻 Tech</button>
                <button onclick="loadCategory('lifestyle')" class="px-4 py-2 rounded-full bg-white/5 hover:bg-lim text-xs font-bold transition">🎬 Lifestyle</button>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-8 py-5 z-[100]">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-lim rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-radio text-white animate-pulse"></i>
                </div>
                <div>
                    <h4 class="text-xs font-black uppercase tracking-widest text-white">Lives In Motion Radio</h4>
                    <p class="text-[10px] text-slate-500 font-bold uppercase italic">On Air: Diaspora Daily</p>
                </div>
            </div>
            <div class="flex-1 max-w-xl w-full">
                <audio id="radio-player" class="w-full h-10" controls src="https://azuracast-nuremberg.myautodj.com/listen/station_8321_1775290855/radio.mp3"></audio>
            </div>
        </div>
    </footer>

    <script>
        const FEEDS = {
            nigeria: 'https://rss.punchng.com/v1/category/latest_news',
            tech: 'https://techcabal.com/feed/',
            lifestyle: 'https://www.vanguardngr.com/category/entertainment/feed/'
        };

        const PROXIES = [
            (url) => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
        ];

        let currentPos = 0;
        let slideTimer;

        async function fetchRSS(url) {
            for (let proxy of PROXIES) {
                try {
                    const res = await fetch(proxy(url));
                    if (res.ok) return await res.text();
                } catch (e) {}
            }
            throw new Error("Feeds unreachable");
        }

        async function loadCategory(cat) {
            const container = document.getElementById('slider-container');
            container.style.transform = `translateX(0)`;
            currentPos = 0;
            clearInterval(slideTimer);

            try {
                const xml = await fetchRSS(FEEDS[cat]);
                const items = new DOMParser().parseFromString(xml, "text/xml").querySelectorAll("item");
                
                container.innerHTML = Array.from(items).slice(0, 15).map((item, index) => {
                    const title = item.querySelector("title").textContent;
                    const link = item.querySelector("link").textContent;
                    const imgUrl = `https://picsum.photos/seed/dim${cat}${index}/600/400`;

                    return `
                        <div class="slide">
                            <article class="glass rounded-[2rem] overflow-hidden group h-full">
                                <div class="h-44 relative">
                                    <img src="${imgUrl}" class="w-full h-full object-cover opacity-60 group-hover:scale-110 transition duration-700">
                                    <div class="absolute inset-0 bg-gradient-to-t from-[#020617] to-transparent"></div>
                                </div>
                                <div class="p-6">
                                    <h3 class="text-sm font-black leading-tight mb-4 group-hover:text-lim transition line-clamp-2">${title}</h3>
                                    <a href="${link}" target="_blank" class="text-[9px] font-black uppercase tracking-widest text-lim border-b border-lim pb-1">Read More</a>
                                </div>
                            </article>
                        </div>
                    `;
                }).join('');

                startAutoScroll();
            } catch (e) {
                container.innerHTML = '<div class="slide p-10 text-slate-500">Service busy. Refresh in 5s.</div>';
            }
        }

        function nextSlide() {
            const container = document.getElementById('slider-container');
            const total = container.children.length;
            const viewable = window.innerWidth >= 1024 ? 3 : (window.innerWidth >= 768 ? 2 : 1);
            
            currentPos = (currentPos + 1) >= (total - viewable + 1) ? 0 : currentPos + 1;
            container.style.transform = `translateX(-${currentPos * (100 / viewable)}%)`;
        }

        function prevSlide() {
            const container = document.getElementById('slider-container');
            const viewable = window.innerWidth >= 1024 ? 3 : (window.innerWidth >= 768 ? 2 : 1);
            currentPos = (currentPos - 1 < 0) ? 0 : currentPos - 1;
            container.style.transform = `translateX(-${currentPos * (100 / viewable)}%)`;
        }

        function startAutoScroll() {
            slideTimer = setInterval(nextSlide, 5000);
        }

        window.onload = () => loadCategory('nigeria');
    </script>
</body>
</html>
