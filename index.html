<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaspora In Motion | Town Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script 
      async 
      crossorigin="anonymous" 
      data-clerk-publishable-key="pk_test_cHJvZm91bmQtc29sZS04MS5jbGVyay5hY2NvdW50cy5kZXYk" 
      src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" 
      type="text/javascript">
    </script>

    <style>
        :root { --lim-green: #1C5E37; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .bg-lim { background-color: var(--lim-green); }
        .text-lim { color: var(--lim-green); }
    </style>
</head>
<body>

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-lim rounded-xl flex items-center justify-center text-white font-bold">D</div>
            <h1 class="text-xl font-black text-slate-800 uppercase">Diaspora <span class="text-lim">In Motion</span></h1>
        </div>
        <div id="user-button"></div>
    </nav>

    <div id="auth-container" class="max-w-md mx-auto mt-10 hidden">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 text-center">
            <h2 class="text-xl font-bold mb-4">Welcome to the Town Square</h2>
            <p class="text-sm text-slate-500 mb-6">Connect with the global diaspora. Sign in to join the conversation.</p>
            <div id="clerk-login-box"></div>
        </div>
    </div>

    <main id="main-content" class="max-w-7xl mx-auto grid lg:grid-cols-12 gap-8 p-6 hidden">
        <aside class="lg:col-span-3 space-y-4">
            <div class="bg-white p-5 rounded-xl border border-gray-200">
                <button onclick="loadCategory('general')" class="w-full text-left p-2 hover:bg-slate-50 rounded font-bold text-sm">🌍 Africa News</button>
                <button onclick="loadCategory('lifestyle')" class="w-full text-left p-2 hover:bg-slate-50 rounded font-bold text-sm">🎬 Lifestyle</button>
            </div>
        </aside>

        <section class="lg:col-span-6">
            <div id="feed" class="space-y-4"></div>
        </section>

        <aside class="lg:col-span-3">
            <div class="bg-black text-white p-6 rounded-xl">
                <h4 class="font-bold mb-2 uppercase text-xs">Premium Directory</h4>
                <button class="w-full bg-white text-black py-2 rounded font-bold text-xs mt-2">Add Your Business</button>
            </div>
        </aside>
    </main>

    <script>
        const PUBLISHABLE_KEY = "pk_test_cHJvZm91bmQtc29sZS04MS5jbGVyay5hY2NvdW50cy5kZXYk";
        const FEEDS = {
            general: 'https://feeds.bbci.co.uk/news/world/africa/rss.xml',
            lifestyle: 'https://allafrica.com/tools/headlines/rdf/lifestyle/main.html'
        };

        // Initialize Clerk
        window.addEventListener('load', async () => {
            const check = setInterval(async () => {
                if (window.Clerk) {
                    clearInterval(check);
                    const clerk = new Clerk(PUBLISHABLE_KEY);
                    await clerk.load();

                    if (clerk.user) {
                        // USER IS LOGGED IN
                        document.getElementById('main-content').classList.remove('hidden');
                        clerk.mountUserButton(document.getElementById("user-button"));
                        loadCategory('general');
                    } else {
                        // USER IS LOGGED OUT
                        document.getElementById('auth-container').classList.remove('hidden');
                        clerk.mountSignIn(document.getElementById("clerk-login-box"));
                    }
                }
            }, 500);
        });

        // News Engine
        async function loadCategory(cat) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '<div class="p-10 text-center animate-pulse">Loading Town Square...</div>';
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(FEEDS[cat])}`);
                const data = await res.json();
                const items = new DOMParser().parseFromString(data.contents, "text/xml").querySelectorAll("item");
                
                feed.innerHTML = Array.from(items).slice(0, 6).map(item => `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h3 class="font-bold text-slate-800 mb-2">${item.querySelector("title").textContent}</h3>
                        <a href="${item.querySelector("link").textContent}" target="_blank" class="text-xs font-bold text-lim">Read Full Story →</a>
                    </div>
                `).join('');
            } catch (e) {
                feed.innerHTML = `<div class="p-10 text-center text-slate-400">Feed temporarily offline.</div>`;
            }
        }
    </script>
</body>
</html>
