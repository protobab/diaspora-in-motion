<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaspora In Motion | Town Square</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --lim-green: #1C5E37; }
        body { background: #020617; font-family: 'Inter', sans-serif; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .text-lim { color: #4ade80; }
        .bg-lim { background-color: var(--lim-green); }
        
        #slider-container { display: flex; transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
        .slide { flex: 0 0 100%; padding: 0 12px; }
        @media (min-width: 768px) { .slide { flex: 0 0 50%; } }
        @media (min-width: 1024px) { .slide { flex: 0 0 33.333%; } }

        .shimmer { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; animation: shim 1.5s infinite; }
        @keyframes shim { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-32">

    <nav class="glass sticky top-0 z-50 px-8 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-lim rounded-xl flex items-center justify-center text-white font-black text-lg shadow-xl">D</div>
            <h1 class="text-xl font-black tracking-tighter italic uppercase">DIASPORA <span class="text-lim">IN MOTION</span></h1>
        </div>
        <div class="flex gap-4">
            <a href="https://www.patreon.com/cw/LivesInMotion" target="_blank" class="bg-white text-black px-5 py-2 rounded-full font-black text-[10px] hover:bg-lim hover:text-white transition-all">JOIN PATREON</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-12">
        
        <section class="relative">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 id="feed-title" class="text-2xl font-black uppercase tracking-tighter">Naija <span class="text-lim italic">Direct</span></h2>
                </div>
                <div class="flex gap-2">
                    <button onclick="prevSlide()" class="w-10 h-10 rounded-full glass hover:bg-lim transition flex items-center justify-center"><i class="fa-solid fa-arrow-left"></i></button>
                    <button onclick="nextSlide()" class="w-10 h-10 rounded-full glass hover:bg-lim transition flex items-center justify-center"><i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <div class="overflow-hidden rounded-[2.5rem]">
                <div id="slider-container" class="py-4">
                    <div class="slide"><div class="h-64 glass rounded-[2rem] shimmer"></div></div>
                    <div class="slide"><div class="h-64 glass rounded-[2rem] shimmer"></div></div>
                    <div class="slide"><div class="h-64 glass rounded-[2rem] shimmer"></div></div>
                </div>
            </div>
        </section>

        <div class="grid lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 bg-gradient-to-br from-[#1C5E37] to-[#064e3b] p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <h4 class="font-black text-xl mb-2">Premium Directory</h4>
                    <p class="text-xs text-white/70 mb-8 leading-relaxed">List your business in the global diaspora marketplace.</p>
                    <a href="https://livesinmotion.lemonsqueezy.com/checkout/buy/7f46f2d4-b982-40cb-baca-1fda62c5d0cb" target="_blank" class="block text-center w-full bg-white text-black py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:scale-105 transition-transform shadow-xl">Add Business Listing</a>
                </div>
                <i class="fa-solid fa-briefcase absolute -bottom-4 -right-4 text-white/5 text-9xl"></i>
            </aside>

            <div class="lg:col-span-8 glass p-8 rounded-[2.5rem] flex flex-wrap gap-4 items-center justify-center">
                <button onclick="loadCategory('nigeria')" class="px-6 py-3 rounded-xl bg-white/5 hover:bg-lim font-bold text-sm transition">🇳🇬 Nigeria News</button>
                <button onclick="loadCategory('entertainment')" class="px-6 py-3 rounded-xl bg-white/5 hover:bg-lim font-bold text-sm transition">🎶 Entertainment</button>
                <button onclick="loadCategory('tech')" class="px-6 py-3 rounded-xl bg-white/5 hover:bg-lim font-bold text-sm transition">🚀 Tech & Biz</button>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-8 py-5 z-[100]">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-lim rounded-full flex items-center justify-center shadow-lg"><i class="fa-solid fa-play text-white animate-pulse"></i></div>
                <div>
                    <h4 class="text-xs font-black uppercase tracking-widest text-white">Lives In Motion Radio</h4>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Streaming Live Globally</p>
                </div>
            </div>
            <div class="flex-1 max-w-xl w-full">
                <audio id="radio-player" class="w-full h-8" controls src="https://azuracast-nuremberg.myautodj.com/listen/station_8321_1775290855/radio.mp3"></audio>
            </div>
        </div>
    </footer>

    <script>
        // Using Google News as a reliable middle-man for RSS
        const FEEDS = {
            nigeria: 'https://news.google.com/rss/search?q=nigeria+news&hl=en-NG&gl=NG&ceid=NG:en',
            entertainment: 'https://news.google.com/rss/search?q=nigeria+entertainment+lifestyle&hl=en-NG&gl=NG&ceid=NG:en',
            tech: 'https://news.google.com/rss/search?q=nigeria+tech+business&hl=en-NG&gl=NG&ceid=NG:en'
        };

        const PROXIES = [
            "https://api.allorigins.win/raw?url=",
            "https://corsproxy.io/?url="
        ];

        let currentPos = 0;
        let slideTimer;

        async function fetchFeed(url) {
            for (let proxy of PROXIES) {
                try {
                    const res = await fetch(proxy + encodeURIComponent(url));
                    if (res.ok) return await res.text();
                } catch (e) {}
            }
            throw new Error("Proxy error");
        }

        async function loadCategory(cat) {
            const container = document.getElementById('slider-container');
            container.innerHTML = '<div class="slide"><div class="h-64 glass rounded-[2rem] shimmer"></div></div>';
            container.style.transform = `translateX(0)`;
            currentPos = 0;
            clearInterval(slideTimer);

            try {
                const xmlText = await fetchFeed(FEEDS[cat]);
                const items = new DOMParser().parseFromString(xmlText, "text/xml").querySelectorAll("item");
                
                container.innerHTML = Array.from(items).slice(0, 15).map((item, i) => {
                    const title = item.querySelector("title").textContent;
                    const link = item.querySelector("link").textContent;
                    const date = new Date(item.querySelector("pubDate").textContent).toLocaleDateString();
                    const img = `https://picsum.photos/seed/${cat}${i}/800/500`;

                    return `
                        <div class="slide">
                            <article class="glass rounded-[2rem] overflow-hidden group h-full flex flex-col border border-white/5 hover:border-lim/50 transition-colors">
                                <div class="h-40 relative overflow-hidden">
                                    <img src="${img}" class="w-full h-full object-cover opacity-50 group-hover:scale-110 transition duration-1000">
                                    <div class="absolute inset-0 bg-gradient-to-t from-[#020617] to-transparent"></div>
                                    <span class="absolute top-4 left-4 bg-lim text-[8px] font-black px-2 py-1 rounded-md uppercase">Live</span>
                                </div>
                                <div class="p-6 flex-1 flex flex-col justify-between">
                                    <h3 class="text-sm font-bold leading-snug mb-4 group-hover:text-lim transition line-clamp-2">${title}</h3>
                                    <div class="flex justify-between items-center">
                                        <span class="text-[9px] text-slate-500 font-bold">${date}</span>
                                        <a href="${link}" target="_blank" class="text-[9px] font-black uppercase text-lim border-b border-lim pb-0.5">Read More</a>
                                    </div>
                                </div>
                            </article>
                        </div>
                    `;
                }).join('');

                startAutoScroll();
            } catch (e) {
                container.innerHTML = '<div class="slide p-10 text-slate-500 font-bold uppercase text-xs tracking-widest">Network Busy. Try again in a moment.</div>';
            }
        }

        function nextSlide() {
            const container = document.getElementById('slider-container');
            const total = container.children.length;
            if (total <= 1) return;
            const viewable = window.innerWidth >= 1024 ? 3 : (window.innerWidth >= 768 ? 2 : 1);
            currentPos = (currentPos + 1) >= (total - viewable + 1) ? 0 : currentPos + 1;
            container.style.transform = `translateX(-${currentPos * (100 / viewable)}%)`;
        }

        function prevSlide() {
            const container = document.getElementById('slider-container');
            const viewable = window.innerWidth >= 1024 ? 3 : (window.innerWidth >= 768 ? 2 : 1);
            currentPos = (currentPos - 1 < 0) ? 0 : currentPos - 1;
            container.style.transform = `translateX(-${currentPos * (100 / viewable)}%)`;
        }

        function startAutoScroll() {
            slideTimer = setInterval(nextSlide, 6000);
        }

        window.onload = () => loadCategory('nigeria');
    </script>
</body>
</html>
